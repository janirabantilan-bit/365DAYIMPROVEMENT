<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>365 Day Level Up Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #121214;
            --card-color: #1a1a1e;
            --primary-yellow: #fcd34d;
            --success-green: #22c55e;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-color);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #2a2a30;
        }

        /* Views management */
        .view { display: none; }
        .view.active { display: block; }

        /* Header / Navigation */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .nav-btn {
            background: #2a2a30;
            border: none;
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-btn:hover { background: #3f3f46; }

        /* Level Main Display */
        .level-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .level-title {
            font-size: 2rem;
            color: var(--primary-yellow);
            margin: 0;
            font-weight: 800;
        }

        .level-status {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* Task Grid */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .task-box {
            background: #222226;
            border: 2px solid #3f3f46;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .task-box:hover {
            transform: translateY(-2px);
            border-color: var(--primary-yellow);
        }

        .task-box.completed {
            border-color: var(--success-green);
            background: rgba(34, 197, 94, 0.1);
        }

        .task-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
            display: block;
        }

        .task-text {
            font-weight: 600;
            font-size: 1rem;
        }

        .complete-badge {
            display: none;
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--success-green);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 8px;
            font-weight: bold;
        }

        .task-box.completed .complete-badge {
            display: block;
        }

        /* Log Book section */
        .log-section {
            background: #222226;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .log-section h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .log-input {
            width: 100%;
            padding: 12px;
            background: #121214;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        /* Rest Day Card Style */
        .rest-day-card {
            background: rgba(34, 197, 94, 0.1);
            border: 2px dashed var(--success-green);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 24px;
        }

        /* Progress List View */
        .list-title {
            font-size: 1.5rem;
            margin-bottom: 16px;
        }

        .level-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222226;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid #3f3f46;
            cursor: pointer;
            transition: background 0.2s;
        }

        .level-list-item:hover {
            background: #2b2b30;
        }

        /* Completed levels stand out in beautiful yellow label styling */
        .level-list-item.completed-level {
            border-color: var(--primary-yellow);
            background: rgba(252, 211, 77, 0.05);
        }

        .list-level-num { font-weight: bold; }
        .status-badge { font-size: 0.85rem; padding: 4px 10px; border-radius: 20px; }
        .badge-done { background: var(--primary-yellow); color: black; font-weight: bold; }
        .badge-open { background: #3f3f46; color: white; }
        .badge-current { background: var(--success-green); color: black; font-weight: bold; }

        /* Preview Window Container inside map */
        .preview-box {
            background: #1e1e24;
            border: 2px solid #3f3f46;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .preview-title {
            color: var(--primary-yellow);
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="mainView" class="view active">
        <div class="header">
            <span style="font-weight: bold; color: var(--text-muted);" id="viewModeTag">🎮 Game Mode</span>
            <button class="nav-btn" onclick="switchView('listView')">📜 Level Map</button>
        </div>

        <div class="level-header">
            <h1 class="level-title" id="currentLevelTitle">LEVEL 1</h1>
            <div class="level-status" id="levelSubtitle">Complete all quests to level up</div>
        </div>

        <div class="task-grid" id="taskGrid">
            </div>

        <div class="rest-day-card" id="restDayCard" style="display: none;">
            <span style="font-size: 3rem;">🎉</span>
            <h2>BONUS REST DAY!</h2>
            <p style="color: var(--text-muted);">Enjoy your well-deserved break.</p>
            <button class="nav-btn" style="background: var(--success-green); color: black; width: 100%;" onclick="completeRestDay()">Claim & Level Up</button>
        </div>

        <div class="log-section" id="logSection">
            <h3>📝 Quick Log Notes</h3>
            <input type="text" id="logInput" class="log-input" placeholder="Type notes here (e.g., 'Felt strong today!')">
        </div>
    </div>

    <div id="listView" class="view">
        <div class="header">
            <h2 class="list-title">Journey Map</h2>
            <button class="nav-btn" onclick="returnToMainGame()">🎮 Back to Game</button>
        </div>

        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top:-10px; margin-bottom:15px;">
            💡 Tap any level to preview its challenges, interact with them early, or edit your logs!
        </p>

        <div id="levelHistoryList">
            </div>
    </div>

</div>

<script>
    // 1. DYNAMIC GAME DATA BUILDER (Levels 1 to 30+)
    const challengeData = {};

    function generateGameDatabase() {
        for (let i = 1; i <= 40; i++) {
            // Rest Days setup
            if ([7, 14, 20, 27, 34].includes(i)) {
                challengeData[i] = { tasks: [], isRest: true };
                continue;
            }

            let tasks = [];
            
            // Logic for regular levels based on your exact update prompt rules
            if (i >= 1 && i <= 5) {
                tasks.push({ text: "200 P.U", icon: "💪" });
            } else if (i >= 6 && i <= 11) {
                tasks.push({ text: "200 P.U", icon: "💪" }, { text: "1 DUO", icon: "🦉" });
            } else if (i >= 12 && i <= 13) {
                tasks.push({ text: "200 P.U", icon: "💪" }, { text: "1 DUO", icon: "🦉" }, { text: "1/2 Protein", icon: "🥤" });
            } else if (i >= 15 && i <= 16) {
                tasks.push({ text: "200 P.U", icon: "💪" }, { text: "2 DUO", icon: "🦉" }, { text: "1/2 Protein", icon: "🥤" });
            } else if (i >= 17 && i <= 19) {
                tasks.push({ text: "190 P.U", icon: "💪" }, { text: "2 DUO", icon: "🦉" }, { text: "1/2 Protein", icon: "🥤" });
            } else if (i >= 21 && i <= 23) {
                tasks.push({ text: "200 P.U", icon: "💪" }, { text: "2 DUO", icon: "🦉" }, { text: "1/2 Protein", icon: "🥤" });
            } else if (i >= 24 && i <= 26) {
                tasks.push({ text: "250 P.U", icon: "💪" }, { text: "2 DUO", icon: "🦉" }, { text: "1/2 Protein", icon: "🥤" });
            } else if (i >= 28 && i <= 33) {
                // adding baths incrementally matching spreadsheet columns
                let levelTasks = [{ text: "250 P.U", icon: "💪" }, { text: "2 DUO", icon: "🦉" }, { text: "1/2 Protein", icon: "🥤" }];
                if (i >= 30) levelTasks.push({ text: "1 bath", icon: "🛁" });
                tasks = levelTasks;
            } else if (i >= 35 && i <= 40) {
                tasks.push({ text: "250 P.U", icon: "💪" }, { text: "2 DUO", icon: "🦉" }, { text: "1/2 Protein", icon: "🥤" }, { text: "1 bath", icon: "🛁" }, { text: "1 TB", icon: "📚" });
            }

            challengeData[i] = { tasks: tasks, isRest: false };
        }
    }
    generateGameDatabase();

    // 2. STATE STORAGE MANAGEMENT (Tracks separate completion for all tasks)
    let mainStoryLevel = 1; // The actual level you are anchored on
    let viewingLevel = 1;  // The level currently displayed on screen (can change during preview)
    
    // Store checklist tracking state globally per level index
    let completionRegistry = {}; 
    Object.keys(challengeData).forEach(lvl => {
        completionRegistry[lvl] = [];
    });

    // 3. VIEW CONTROLLER
    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        if(viewId === 'listView') { renderLevelList(); }
    }

    function returnToMainGame() {
        viewingLevel = mainStoryLevel; // Snap interface back to actual user story level
        document.getElementById("viewModeTag").innerText = "🎮 Game Mode";
        document.getElementById("viewModeTag").style.color = "var(--text-muted)";
        loadLevel(mainStoryLevel);
        switchView('mainView');
    }

    // 4. INTERACTIVE ENGINE: RENDER TARGET LEVEL
    function loadLevel(levelNum) {
        viewingLevel = levelNum;
        const levelInfo = challengeData[levelNum];
        
        document.getElementById("currentLevelTitle").innerText = `LEVEL ${levelNum}`;
        
        const grid = document.getElementById("taskGrid");
        const restCard = document.getElementById("restDayCard");
        const logSec = document.getElementById("logSection");

        if (levelInfo.isRest) {
            grid.style.display = "none";
            logSec.style.display = "none";
            restCard.style.display = "block";
        } else {
            grid.style.display = "grid";
            logSec.style.display = "block";
            restCard.style.display = "none";
            grid.innerHTML = "";

            levelInfo.tasks.forEach((task, index) => {
                const box = document.createElement("div");
                box.className = "task-box";
                
                // Keep track if it was previously checked off
                if (completionRegistry[levelNum].includes(index)) {
                    box.classList.add("completed");
                }

                box.innerHTML = `
                    <span class="complete-badge">✓ COMPLETE</span>
                    <span class="task-icon">${task.icon}</span>
                    <span class="task-text">${task.text}</span>
                `;
                box.onclick = () => toggleTask(index, box, levelNum);
                grid.appendChild(box);
            });
        }
    }

    // 5. MANUAL EDIT & OVERVIEW TOGGLE
    function toggleTask(index, element, levelNum) {
        let registry = completionRegistry[levelNum];

        if (registry.includes(index)) {
            // Uncheck action (allows full editing back and forth)
            completionRegistry[levelNum] = registry.filter(i => i !== index);
            element.classList.remove("completed");
        } else {
            // Check action
            registry.push(index);
            element.classList.add("completed");
            confetti({ particleCount: 30, spread: 35, origin: { y: 0.6 } });

            // Check if this action triggers a real story level up
            const totalTasks = challengeData[levelNum].tasks.length;
            if (registry.length === totalTasks && levelNum === mainStoryLevel) {
                setTimeout(levelUpCelebration, 600);
            }
        }
    }

    // 6. CLAIM REST DAYS
    function completeRestDay() {
        if (viewingLevel === mainStoryLevel) {
            levelUpCelebration();
        } else {
            // If they are checking off a rest day in a different preview level
            alert(`Level ${viewingLevel} Rest day registered!`);
        }
    }

    // 7. LEVEL UP SYSTEM
    function levelUpCelebration() {
        var duration = 1.5 * 1000;
        var end = Date.now() + duration;

        (function frame() {
            confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 } });
            confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 } });
            if (Date.now() < end) { requestAnimationFrame(frame); }
        }());

        setTimeout(() => {
            if (viewingLevel === mainStoryLevel) {
                mainStoryLevel++;
                viewingLevel = mainStoryLevel;
            }
            loadLevel(viewingLevel);
        }, 1200);
    }

    // 8. RENDER NAVIGATION LIST MAP (WITH PREVIEW ROUTER)
    function renderLevelList() {
        const container = document.getElementById("levelHistoryList");
        container.innerHTML = "";

        Object.keys(challengeData).forEach(lvl => {
            lvl = parseInt(lvl);
            let statusBadge = "";
            let itemClass = "level-list-item";
            
            if (lvl < mainStoryLevel) {
                statusBadge = '<span class="status-badge badge-done">Completed</span>';
                itemClass += " completed-level"; // Highlights yellow
            } else if (lvl === mainStoryLevel) {
                statusBadge = '<span class="status-badge badge-current">Active Current</span>';
            } else {
                statusBadge = '<span class="status-badge badge-open">Preview Available</span>';
            }

            const item = document.createElement("div");
            item.className = itemClass;
            item.innerHTML = `
                <span class="list-level-num">Level ${lvl} ${challengeData[lvl].isRest ? '🌴 (Rest)' : ''}</span>
                ${statusBadge}
            `;
            
            // Clicking a list row transports you directly to view and interact with that level!
            item.onclick = () => {
                document.getElementById("viewModeTag").innerText = `🔍 Previewing Level ${lvl}`;
                document.getElementById("viewModeTag").style.color = "var(--primary-yellow)";
                loadLevel(lvl);
                switchView('mainView');
            };

            container.appendChild(item);
        });
    }

    // Init Engine
    loadLevel(mainStoryLevel);
</script>

</body>
</html>
